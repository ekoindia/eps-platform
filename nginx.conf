server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # Serve pre-generated markdown / llms.txt files with correct Content-Type
  # and do NOT fall back to the SPA for missing .md requests.
  location ~ \.md$ {
    default_type text/markdown;
    charset utf-8;
    try_files $uri =404;
  }

  location = /llms.txt {
    default_type text/plain;
    charset utf-8;
    try_files $uri =404;
  }

  # Hashed assets are immutable; missing ones (stale chunks after a
  # redeploy) must 404, not fall back to the SPA shell.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /__spa-fallback.html;
  }
}
