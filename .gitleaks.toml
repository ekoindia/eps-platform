# gitleaks configuration for EPS Platform
#
# Extends the default ruleset and adds allowlists for KNOWN-SAFE matches:
#   - generated/baked artifacts and local env files (not source of truth), and
#   - illustrative, non-secret EXAMPLE JWTs inside the API spec docs
#     (request/response samples — placeholders or expired sandbox example tokens).
#
# Anything NOT listed here still trips the scan, so real secrets are still caught.
# Do NOT add real production credentials to these allowlists — scrub them from the
# code (and from history) instead.

[extend]
useDefault = true

# Generated / baked outputs (regenerated from src/lib/data, never hand-edited) and
# local-only dev env (gitignored; contains the developer's own sandbox creds).
[[allowlists]]
description = "EPS generated/baked artifacts and local env files"
paths = [
  '''^dist/''',
  '''^ds-bundle/''',
  '''^packages/[^/]+/data/''',
  '''(^|/)\.env\.local$''',
]

# Obvious fake placeholder used throughout the API spec examples (any file).
[[allowlists]]
description = "Obvious fake placeholder token"
regexes = [
  '''wtkn_abc123xyz''',
]

# Illustrative / expired example JWTs shown as `example:` values in the API spec
# docs (any header alg — HS256, RS256 — or `typ`-first tokens like the OTP
# verification token). condition = "AND" scopes this narrowly: a JWT-shaped value
# is allowlisted ONLY inside api-specs.ts. A real JWT leaked in any other file is
# still caught. Documentation only; signing keys are server-side, never shipped.
[[allowlists]]
description = "Documentation example JWTs in api-specs.ts"
condition = "AND"
paths = [
  '''(^|/)src/lib/data/api-specs\.ts$''',
]
regexes = [
  '''eyJ[A-Za-z0-9_.\-]{10,}''',
]
