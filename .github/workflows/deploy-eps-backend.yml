name: Deploy eps-backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: eps-backend-deploy
  cancel-in-progress: false

jobs:
  publish:
    name: Build + publish image
    runs-on: ubuntu-latest
    # Only a successful CI run from a push to main may publish.
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/ekoindia/eps-backend
      SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout the built commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # A newer main may have landed (and its own CI completed) while this older
      # run was queued. Publishing now would move :prod backwards. Skip if the
      # built SHA is no longer the tip of origin/main.
      - name: Stale-run guard
        id: guard
        run: |
          git fetch origin main --depth=1
          tip="$(git rev-parse FETCH_HEAD)"
          if [ "$SHA" != "$tip" ]; then
            echo "Superseded: built $SHA but origin/main is $tip; skipping." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.guard.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        if: steps.guard.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build + push :sha
        if: steps.guard.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: packages/eps-backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ env.SHA }}
          labels: |
            org.opencontainers.image.revision=${{ env.SHA }}
            org.opencontainers.image.source=https://github.com/ekoindia/eps-platform

      # Point :prod at the exact digest just pushed — no rebuild, atomic retag.
      - name: Retag :prod to the pushed digest
        if: steps.guard.outputs.skip != 'true'
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:prod" \
            "$IMAGE@${{ steps.build.outputs.digest }}"
