name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main
      - "feature/**"

jobs:
  web-and-packages:
    name: Web + JS/TS packages
    runs-on: ubuntu-latest
    services:
      # Real Redis for the eps-backend KV contract + fail-closed integration
      # tests (src/store/redis.test.ts). They self-skip unless REDIS_TEST_URL is
      # set, so this service is what makes them actually run in CI. redis:7
      # satisfies the >=6.2 GETDEL/Lua floor the backend requires.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce npm (no Bun lockfiles)
        run: |
          if git ls-files --error-unmatch bun.lock bun.lockb 2>/dev/null; then
            echo "::error::Bun lockfile committed. This project standardizes on npm — remove bun.lock/bun.lockb."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build (website + agent bundles)
        run: npm run build

      # The SDK surface is baked here (gitignored, not committed). Hand it to the
      # separate php-sdk job as an artifact so PHP tests get the runtime asset
      # without rebuilding the website. Generic name — future SDK jobs reuse it.
      - name: Upload baked SDK surface
        uses: actions/upload-artifact@v4
        with:
          name: sdk-surface
          path: packages/sdk-php/data/sdk-surface.json
          if-no-files-found: error
          retention-days: 7

      - name: Test website
        run: npx vitest run

      - name: Test eps-context-mcp
        run: npm test -w @ekoindia/eps-context-mcp

      - name: Test eps-sdk (Node.js)
        run: npm test -w @ekoindia/eps-sdk

      # transact-mcp imports @ekoindia/eps-sdk via its package main (dist/), so
      # the SDK must be tsup-built first; its baked data came from `npm run build`.
      - name: Test eps-transact-mcp
        run: npm run transact:test

      - name: Test eps-mock-server
        run: npm test -w @ekoindia/eps-mock-server

      - name: Test eps-backend (incl. Redis integration)
        run: npm test -w @ekoindia/eps-backend
        env:
          # Flips src/store/redis.test.ts from skip -> run against the `redis`
          # service container above. Without this the backend suite still runs,
          # but the Redis adapter (Lua incr, GETDEL, fail-closed) stays unproven.
          REDIS_TEST_URL: redis://localhost:6379

      - name: Shellcheck poller
        run: shellcheck packages/eps-backend/deploy/poller/poll.sh

      - name: Test eps-backend poller (bash shim harness)
        run: npm run test:poller -w @ekoindia/eps-backend

      - name: Validate prod compose
        working-directory: packages/eps-backend
        run: |
          # A well-formed 64-hex digest (sha256:0 fails digest-format validation).
          d=$(printf '0%.0s' $(seq 64))
          {
            printf 'EPS_BACKEND_IMAGE=ghcr.io/ekoindia/eps-backend@sha256:%s\n' "$d"
            printf 'EPS_TRANSACT_MCP_IMAGE=ghcr.io/ekoindia/eps-transact-mcp@sha256:%s\n' "$d"
          } > deploy.env
          : > .env
          docker compose -p eps-backend --project-directory . \
            --env-file deploy.env -f docker-compose.prod.yml config -q
          rm -f deploy.env .env

      # Container smoke for the transactional MCP: the build exercises the risky
      # parts (workspace resolution, baked-data copy); then prove /healthz answers.
      - name: Build + smoke eps-transact-mcp image
        run: |
          docker build -t eps-transact-mcp-ci -f packages/eps-transact-mcp/Dockerfile .
          cid=$(docker run -d -p 8788:8788 eps-transact-mcp-ci)
          ok=""
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:8788/healthz > /dev/null; then ok=1; break; fi
            sleep 1
          done
          docker logs "$cid"
          docker rm -f "$cid"
          [ "$ok" = "1" ]

  php-sdk:
    name: PHP SDK
    runs-on: ubuntu-latest
    # Depends on the JS job only to receive its baked sdk-surface artifact (the
    # PHP runner never runs the website build). PHP failing leaves this job's
    # status independent of the JS check; the JS check is the release gate.
    needs: web-and-packages
    defaults:
      run:
        working-directory: packages/sdk-php
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # data/sdk-surface.json is generated (gitignored), not committed. The
      # web-and-packages job bakes it via `npm run build` and uploads it as the
      # `sdk-surface` artifact; pull it into data/ before tests run. The path is
      # repo-root-relative — defaults.run.working-directory does not apply here.
      - name: Download baked SDK surface
        uses: actions/download-artifact@v4
        with:
          name: sdk-surface
          path: packages/sdk-php/data

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      # No phpunit.xml is present, so point phpunit at the tests directory and
      # bootstrap Composer's autoloader explicitly.
      - name: Run PHPUnit
        run: vendor/bin/phpunit --bootstrap vendor/autoload.php tests
