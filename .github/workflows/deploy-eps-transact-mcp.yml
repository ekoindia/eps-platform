name: Deploy eps-transact-mcp

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: eps-transact-mcp-deploy
  cancel-in-progress: false

jobs:
  publish:
    name: Build + publish image
    runs-on: ubuntu-latest
    # Only a successful CI run from a push to main may publish.
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/ekoindia/eps-transact-mcp
      SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout the built commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0 # full history so the change-guard can diff the parent

      # Two reasons to skip a publish:
      #  1. Stale — a newer main landed while this run queued; publishing would
      #     move :prod backwards. Skip if the built SHA is no longer origin/main tip.
      #  2. Unchanged — this commit touched nothing that affects the image. The
      #     transact image bakes the bundle from src/ (Bake step runs `npm run
      #     build`), so image-affecting paths include src/** + build machinery.
      #     Compares against the first parent (main lands via merge/squash PR, so
      #     that's the pre-merge tip); if the parent can't be resolved, don't skip.
      - name: Stale-or-unchanged guard
        id: guard
        run: |
          skip=""
          git fetch origin main --depth=1
          tip="$(git rev-parse FETCH_HEAD)"
          if [ "$SHA" != "$tip" ]; then
            echo "Superseded: built $SHA but origin/main is $tip; skipping." >&2
            skip=true
          fi
          if [ "$skip" != "true" ]; then
            parent="$(git rev-parse --verify --quiet "$SHA^" || true)"
            if [ -n "$parent" ] && git diff --quiet "$parent" "$SHA" -- \
              'src/**' \
              'packages/eps-transact-mcp/**' \
              'packages/sdk-js/**' \
              'scripts/**' \
              'ssg/**' \
              '.githooks/setup.mjs' \
              'index.html' \
              'vite.config.ts' \
              'vite-plugin-*.ts' \
              'tsconfig*.json' \
              'package.json' \
              'package-lock.json' \
              '.github/workflows/deploy-eps-transact-mcp.yml'; then
              echo "No image-affecting changes in $SHA; skipping deploy." >&2
              skip=true
            fi
          fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

      # Unlike eps-backend, this image needs baked data (data/eps.json,
      # packages/sdk-js/data/sdk-surface.json) in the build context — both are
      # gitignored artifacts of the root website build.
      - name: Setup Node.js
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bake bundles
        if: steps.guard.outputs.skip != 'true'
        run: |
          npm ci
          npm run build

      - name: Log in to GHCR
        if: steps.guard.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        if: steps.guard.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build + push :sha
        if: steps.guard.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: packages/eps-transact-mcp/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ env.SHA }}
          labels: |
            org.opencontainers.image.revision=${{ env.SHA }}
            org.opencontainers.image.source=https://github.com/ekoindia/eps-platform

      # Point :prod at the exact digest just pushed — no rebuild, atomic retag.
      - name: Retag :prod to the pushed digest
        if: steps.guard.outputs.skip != 'true'
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:prod" \
            "$IMAGE@${{ steps.build.outputs.digest }}"
