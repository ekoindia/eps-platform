name: Secret scan

# Blocks accidental commits of API keys, tokens, or other secrets in NEW work.
# Scans the commits in each push and the diff of each pull request (not full
# history): gitleaks-action scans the event's commit range, so pre-existing
# commits are not re-scanned. This is intentional — legacy pre-open-source
# history contains an accepted sandbox-only `developer_key` that is not being
# rewritten out; rescanning all history would flag it on every run. New secrets
# introduced going forward are still caught. See .gitleaks.toml for the allowlist
# of documentation example tokens and generated artifacts.

on:
  pull_request:
  push:
    branches:
      - dev
      - main
      - "feature/**"

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need enough history for gitleaks-action to compute the push/PR commit
          # range. 0 = full fetch; the action still scans only the event's range.
          fetch-depth: 0

      # We run the gitleaks CLI directly rather than gitleaks/gitleaks-action@v2:
      # that action hard-requires a paid GITLEAKS_LICENSE for org-owned repos
      # (this repo lives under the `ekoindia` org), while the CLI is free (MIT).
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          TARBALL="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSfL -o "$TARBALL" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${TARBALL}"
          echo "${SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xzf "$TARBALL" gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        env:
          # Interpolate event fields via env (not inline in the script) per GitHub
          # Actions injection guidance. These are commit SHAs (hex only), but this
          # keeps the safe pattern uniform.
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # PR: base..head is exactly the new commits proposed by the PR.
            RANGE="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # New branch's first push (e.g. feature/**): `before` is empty, so a
            # plain range would be undefined. Scan every commit on this branch that
            # is NOT yet on the default branch — catches all new work in the push
            # (not just the tip) while skipping already-reviewed legacy history.
            git fetch --no-tags origin main
            RANGE="origin/main..${PUSH_AFTER}"
          else
            # Subsequent push: only the commits added by this push.
            RANGE="${PUSH_BEFORE}..${PUSH_AFTER}"
          fi
          echo "Scanning commit range: $RANGE"
          gitleaks git . \
            --config .gitleaks.toml \
            --log-opts="$RANGE" \
            --redact \
            --verbose
