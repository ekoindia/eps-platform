# PPI product merge: Levin + DigiKhata collapsed into one PPI Wallet product.
[[redirects]]
  from = "/products/ppi-levin-api"
  to = "/products/ppi-api"
  status = 301
  force = true

[[redirects]]
  from = "/products/ppi-digikhata-api"
  to = "/products/ppi-api"
  status = 301
  force = true

# Endpoint docs slug migrations (master-nomenclature alignment).
# Renamed DMT-Fino eKYC/OTP specs + removed duplicate aadhaar-dmt-fino-* pages
# redirect to their canonical /docs slugs so external links keep resolving.
[[redirects]]
  from = "/docs/dmt-sender-ekyc"
  to = "/docs/dmt-fino-sender-ekyc"
  status = 301
  force = true

[[redirects]]
  from = "/docs/dmt-validate-ekyc-otp"
  to = "/docs/dmt-fino-validate-ekyc-otp"
  status = 301
  force = true

[[redirects]]
  from = "/docs/aadhaar-dmt-fino-ekyc"
  to = "/docs/dmt-fino-sender-ekyc"
  status = 301
  force = true

[[redirects]]
  from = "/docs/aadhaar-dmt-fino-verify-otp"
  to = "/docs/dmt-fino-validate-ekyc-otp"
  status = 301
  force = true

# Quickstart guide folded into the /docs overview (now the quickstart itself).
[[redirects]]
  from = "/docs/quickstart"
  to = "/docs"
  status = 301
  force = true

# Missing hashed assets (stale chunks after a redeploy) must 404,
# not serve the SPA shell as HTML with a 200.
[[redirects]]
  from = "/assets/*"
  to = "/__spa-fallback.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/__spa-fallback.html"
  status = 200
